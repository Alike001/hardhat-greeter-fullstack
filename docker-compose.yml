services:
  chain:
    build: ./contracts-backend
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8545"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s

  deploy:
    build: ./contracts-backend
    command: sh -c "yes | npx hardhat ignition deploy ignition/modules/Greeter.ts --network docker --reset"
    depends_on:
      chain:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      deploy:
        condition: service_completed_successfully
